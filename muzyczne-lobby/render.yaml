services:
  - type: web
    name: muzyczne-lobby
    env: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: MODERATOR_PASSWORD
        value: Kochamkotki
    disk:
      name: muzyczne-lobby-data
      mountPath: /var/data
      sizeGB: 1
